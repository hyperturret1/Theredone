<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spy Video</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      background:
      linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9));

      font-family: Arial, sans-serif;
      color: white;
    }

    .container {
      width: 90%;
      max-width: 900px;
      text-align: center;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    video {
      width: 100%;
      border-radius: 12px;
      background: black;
    }

    .download-button {
      display: inline-block;

      margin-top: 15px;
      padding: 10px 18px;

      background: #007bff;
      color: white;

      text-decoration: none;
      border-radius: 8px;

      cursor: pointer;
      transition: 0.3s;
    }

    .download-button:hover {
      background: #0056b3;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="title">
      Spy Video
    </div>

    <video controls>
      <source src="https://www.dropbox.com/scl/fi/l85xkuf47gfote0ddf95q/spy.mp4?rlkey=kt9btg741a1dlgnwytubo87bn&raw=1" type="video/mp4">

      Your browser does not support video playback.
    </video>

    <a href="#" class="download-button">
      Download
    </a>

  </div>

</body>
</html>
