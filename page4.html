<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spy Video Player</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9));
      font-family: Arial, sans-serif;
      color: white;
    }

    .container {
      width: 90%;
      max-width: 900px;
      text-align: center;
    }

    video {
      width: 100%;
      border-radius: 12px;
      background: black;
    }

    .title {
      font-size: 24px;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .download-button {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 18px;
      background: #007bff;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
    }

    .download-button:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="title">Spy Video</div>

    <video controls>
      <source src="https://www.dropbox.com/scl/fi/q8g42rikhyudtm6y27d55/spy.mp4?rlkey=h6dabzz124f57q6g5y6bym7q7&raw=1" type="video/mp4">

      <track
        src="https://www.dropbox.com/scl/fi/b53lcvmh7xkhb80rpwi2o/spy.srt?rlkey=ytvcu4y12f8pbqfb7bwe00c0p&raw=1"
        kind="subtitles"
        srclang="en"
        label="English"
        default>

      Your browser does not support video playback.
    </video>

    <!-- decorative button -->
    <a href="#" class="download-button">Download</a>

  </div>

</body>
</html>
